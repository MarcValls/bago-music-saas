name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA (auto-accept all)
        run: |
          mkdir -p twa
          yes | bubblewrap init \
            --manifest https://marcvalls.github.io/bago-music-saas/manifest.json \
            --directory twa > /dev/null 2>&1
        timeout-minutes: 8

      - name: Build APK
        run: |
          cd twa
          bubblewrap build > /dev/null 2>&1
        timeout-minutes: 8

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-apk
          path: twa/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-aab
          path: twa/*.aab
