name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Install expect
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: Init TWA
        run: |
          mkdir -p twa
          /usr/bin/expect -c '
            set timeout 300
            spawn bubblewrap init \
              --manifest https://marcvalls.github.io/bago-music-saas/manifest.json \
              --directory twa
            expect {
              -re {\(y/N\)} { send "n\r"; exp_continue }
              -re {\?.*:} { send "\r"; exp_continue }
              timeout { puts "TIMEOUT"; exit 1 }
              eof { puts "EOF"; exit 0 }
            }
          '
        timeout-minutes: 8

      - name: Build APK
        run: |
          cd twa
          bubblewrap build
        timeout-minutes: 10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-apk
          path: twa/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-aab
          path: twa/*.aab
