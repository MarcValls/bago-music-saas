name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA (non-interactive)
        run: |
          mkdir -p twa
          # Configurar bubblewrap para no-interactive
          bubblewrap init \
            --manifest https://marcvalls.github.io/bago-music-saas/manifest.json \
            --directory twa
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        timeout-minutes: 5

      - name: Build APK
        run: |
          cd twa
          bubblewrap build
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        timeout-minutes: 10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-apk
          path: twa/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-aab
          path: twa/*.aab
