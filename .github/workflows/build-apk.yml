name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Init TWA with Docker (pseudo-TTY)
        run: |
          rm -rf twa
          mkdir -p twa
          yes | docker run --rm -t -i -v $(pwd)/twa:/twa -w /twa \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            init --manifest https://marcvalls.github.io/bago-music-saas/manifest.json --directory /twa
        timeout-minutes: 15

      - name: Build APK with Docker
        run: |
          docker run --rm -t -v $(pwd)/twa:/twa -w /twa \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            build
        timeout-minutes: 15

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-apk
          path: twa/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-aab
          path: twa/*.aab