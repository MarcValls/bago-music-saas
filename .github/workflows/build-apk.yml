name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<'JSON'
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          JSON

      - name: Init TWA
        run: |
          rm -rf twa
          mkdir -p twa
          npx bubblewrap init \
            --manifest https://marcvalls.github.io/bago-music-saas/manifest.json \
            --directory twa \
            --packageId com.bago.music \
            --host marcvalls.github.io \
            --name "BAGO Music Score" \
            --launcherName "BAGO Music" \
            --display standalone \
            --themeColor "#00D4AA" \
            --navigationColor "#000000" \
            --backgroundColor "#0C0C0C" \
            --startUrl "/bago-music-saas/" \
            --iconUrl "https://marcvalls.github.io/bago-music-saas/icon-192.svg" \
            2>&1 || true
          ls -la twa/
        timeout-minutes: 5

      - name: Build APK
        run: |
          cd twa
          npx bubblewrap build
        timeout-minutes: 15

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-apk
          path: twa/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-aab
          path: twa/*.aab