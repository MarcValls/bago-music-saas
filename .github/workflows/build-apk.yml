name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Servir manifest localmente
        run: |
          python3 -m http.server 8765 &
          sleep 2
          echo "Servidor local iniciado"

      - name: Init TWA
        run: |
          mkdir -p twa
          bubblewrap init \
            --manifest http://localhost:8765/manifest.json \
            --directory twa
        timeout-minutes: 5

      - name: Build APK
        run: |
          cd twa
          bubblewrap build
        timeout-minutes: 10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-apk
          path: twa/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bago-music-aab
          path: twa/*.aab
